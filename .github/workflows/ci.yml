name: CI

on:
  pull_request:
  push:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Preview
    env:
      GOOGLE_CALLBACK_URL: ${{ vars.GOOGLE_CALLBACK_URL }}
      APPLICATION_URL: ${{ vars.APPLICATION_URL }}
      FRONTEND_APPLICATION_URL: ${{ vars.FRONTEND_APPLICATION_URL }}
      RESEND_EMAIL_USER: ${{ vars.RESEND_EMAIL_USER }}
      TEST_EMAIL: ${{ vars.TEST_EMAIL }}
      PORT: ${{ vars.PORT }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      MONGODB_CONNECTION: ${{ secrets.MONGODB_CONNECTION }}
      MONGODB_TEST_CONNECTION: ${{ secrets.MONGODB_TEST_CONNECTION }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SHOPIFY_APP_CLIENT_ID: ${{ secrets.SHOPIFY_APP_CLIENT_ID }}
      SHOPIFY_APP_CLIENT_SECRET: ${{ secrets.SHOPIFY_APP_CLIENT_SECRET }}
      SHOPIFY_APP_ACCESS_TOKEN: ${{ secrets.SHOPIFY_APP_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build